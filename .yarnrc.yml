# Yarn 4 configuration
# nodeLinker: node-modules — keeps traditional node_modules layout.
# This avoids PnP compatibility issues with Vite, SvelteKit, and Remotion
# while still benefiting from Yarn 4's improved CLI and workspace tooling.

nodeLinker: node-modules

# Enable corepack-based installs (recommended with Yarn 4)
enableGlobalCache: false

# Workspace-level deduplication on install
nmHoistingLimits: workspaces
