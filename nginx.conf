# SvelteKit Monorepo — Production Nginx Config
# All apps served from a single domain

upstream web     { server localhost:3000; }  # apps/web (adapter-node)
upstream admin   { server localhost:3001; }  # apps/admin
upstream bank    { server localhost:3002; }  # apps/bank
upstream devtools { server localhost:3003; } # apps/devtools
upstream reports { server localhost:3004; }  # apps/reports
upstream remotion { server localhost:3005; } # apps/remotion (optional)

server {
    listen 80;
    server_name localhost;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Standalone apps — path-prefix routing
    location /admin {
        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location /bank {
        proxy_pass http://bank;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /devtools {
        proxy_pass http://devtools;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /reports {
        proxy_pass http://reports;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Optional: Remotion (React app — may have CORS/SSR differences)
    location /remotion {
        proxy_pass http://remotion;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Main web app — everything else
    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
